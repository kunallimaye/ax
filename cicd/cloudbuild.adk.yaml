#
# Cloud Build config to build + push the ADK weather agent image. The build
# context is the repository root so the agent module's local replace of
# github.com/google/ax resolves. Invoked by scripts/deploy-adk-cloudrun.sh.
#
# Substitutions:
#   _IMAGE  full image URI (region-docker.pkg.dev/PROJECT/REPO/NAME:TAG)

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - examples/adk_weather_agent/Dockerfile
      - -t
      - ${_IMAGE}
      - .

images:
  - ${_IMAGE}

options:
  logging: CLOUD_LOGGING_ONLY
