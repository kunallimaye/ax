# Server configuration
server:
  # Address to listen on (host:port)
  address: ":8494"

# Event log configuration
eventlog:
  # SQLite file for event log storage
  db_filename: "eventlog/log.sqlite"

health_check:
  # Whether to enable active health checking
  enabled: true
  # Active health check interval for agents (e.g., "30s", "1m")
  interval: 30s

# Planner configuration (optional)
planner:
  # Gemini planner configuration
  # The Gemini planner uses Google's Gemini models for intelligent agent selection.
  gemini:
    # Model name (e.g., "gemini-3-flash")
    model: "gemini-3-flash-preview"

    # Temperature for generation (0.0 to 1.0)
    temperature: 0.7

    # Maximum output tokens
    max_tokens: 8192

    # Request timeout (e.g., "30s", "1m")
    timeout: 60s

    # Custom system prompt for the planner (optional)
    system_prompt: ""

    # Directory to load standalone skills from
    skills_dir: "./examples/skills"

# Remote agents configuration (optional)
# List of remote or sandbox agents to register on startup.
registry:
